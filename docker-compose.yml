version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: biller-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=biller_app

  api:
    build: .
    container_name: biller-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - DATABASE_NAME=biller_app
      - JWT_SECRET=your-secret-key-change-in-production
      - PORT=8080
    depends_on:
      - mongodb

volumes:
  mongodb_data:
